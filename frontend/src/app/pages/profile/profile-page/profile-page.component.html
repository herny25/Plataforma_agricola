<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=person"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=ADLaM+Display&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=person"/>
<!-- Barra de navegacion -->
<nav class="nav-container">
  <div class="nav-left">
    <div class="logo"></div>
    <div class="nav-links">
      <a routerLink="/home">Inicio</a>
      <a routerLink="/store">Tienda</a>
      <a routerLink="/help">Ayuda</a>
    </div>
  </div>
  <div class="nav-center">
    <img
      src="../assets/iconos/search_24dp_5F6368_FILL0_wght400_GRAD0_opsz24.svg"
      alt="busqueda"
    />
    <input type="text" class="search-bar" placeholder="Buscar" />
  </div>
  <div class="nav-right">
    <div>
      <button class="notification-icon">
        <img
          src="../assets/iconos/icons8-notification.svg"
          alt="notification"
        />
      </button>
    </div>
    <a [routerLink]="['/profile']" class="user-button">
      <span class="material-symbols-outlined"> person </span>Usuario
    </a>
  </div>
</nav>

<!-- Cuerpo de la página -->
<div class="profile-container">
  <div class="profile-content">
    <div class="profile-left">
      <div class="profile-header">
        <div class="icon">
          <svg
            width="67"
            height="67"
            viewBox="0 0 67 67"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M33.5 33.5H43.6667C49.0594 33.5 54.2313 31.3577 58.0445 27.5445C61.8577 23.7313 64 18.5594 64 13.1667V9.77778H53.8333C48.4406 9.77778 43.2687 11.92 39.4555 15.7333C35.6423 19.5465 33.5 24.7184 33.5 30.1111H23.3333C17.9406 30.1111 12.7687 27.9689 8.9555 24.1556C5.14226 20.3424 3 15.1705 3 9.77778V3H13.1667C18.5594 3 23.7313 5.14226 27.5445 8.9555C31.3577 12.7687 33.5 17.9406 33.5 23.3333V43.6667M16.5556 43.6667H50.4444V57.2222C50.4444 59.0198 49.7304 60.7438 48.4593 62.0148C47.1882 63.2859 45.4642 64 43.6667 64H23.3333C21.5358 64 19.8118 63.2859 18.5407 62.0148C17.2696 60.7438 16.5556 59.0198 16.5556 57.2222V43.6667Z"
              stroke="#537052"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <span class="header-text">MI PERFIL</span>
        </div>
      </div>
      <div class="profile-image-section">
        <div class="profile-image-container">
          <img
            src="assets/imagenes/usuario.png"
            alt="Foto de perfil"
            class="profile-image"
          />
        </div>
        <button class="change-image-btn">Cambiar imagen</button>
        <button class="delete-image-btn">Eliminar imagen</button>
      </div>
    </div>
    <div class="vertical-divider"></div>
    <div class="profile-form">
      <div class="form-group">
        <label>Nombre completo</label><br />
        <input placeholder="" type="text" name="text" class="input" />
      </div>

      <div class="form-group">
        <label>Municipio</label><br />
        <input placeholder="" type="text" name="text" class="input" />
      </div>

      <div class="form-group">
        <label>Sexo</label>
        <div class="gender-options">
          <div class="radio-option">
            <input
              type="radio"
              id="masculino"
              name="gender"
              value="masculine"
              class="radio-input"
            />
            <label for="masculino" class="radio-label">
              <span class="radio-circle"></span>
              <span class="radio-text">Masculino</span>
            </label>
          </div>

          <div class="radio-option">
            <input
              type="radio"
              id="femenino"
              name="gender"
              value="feminine"
              class="radio-input"
            />
            <label for="femenino" class="radio-label">
              <span class="radio-circle"></span>
              <span class="radio-text">Femenino</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Fecha de nacimiento</label>
        <div class="date-input-container">
          <input type="date" class="input date-input" placeholder="dd/mm/aa" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half-width">
          <label>Nombre de Usuario</label><br />
          <input placeholder="" type="text" name="text" class="input" />
        </div>

        <div class="form-group half-width">
          <label>Contraseña</label><br />
          <input placeholder="" type="password" name="text" class="input" />
        </div>
      </div>

      <div class="button-row">
        <button class="edit-btn">Editar Información</button>
        <button class="publications-btn">Mis Publicaciones</button>
      </div>
    </div>
  </div>
</div>
